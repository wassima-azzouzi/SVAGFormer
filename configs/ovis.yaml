# ==============================================================
# OVIS Dataset Configuration
# Conforme à SVAG-Bench (arXiv:2510.13016)
# Source: OVIS [22] — Qi et al., IJCV 2022
# ==============================================================

dataset:
  name: OVIS
  root: data/ovis
  split: train
  num_classes: 25
  input_size: [800, 1333]
  description: "Occluded Video Instance Segmentation — complex occlusion scenarios"

# --- Spatial Grounding (TempRMOT) — Section 5.3 ---
spatial_training:
  epochs: 60                    # Article: 60 epochs
  optimizer: Adam
  lr: 1.0e-5
  lr_decay_factor: 10
  lr_decay_epoch: 40
  memory_length: 5
  num_gpus: 4

# --- Temporal Grounding (FlashVTG) — Section 5.3 ---
temporal_training:
  optimizer: AdamW
  feature_dim: 256
  n_heads: 8
  tfl_layers: 5
  K: 4
  nms_threshold: 0.7
  data_format: qvhighlights
  # max_visual_length ajusté pour OVIS (vidéos plus courtes)
  max_visual_length: 500

# --- Évaluation (SVAGEval) — Section 5.1 ---
evaluation:
  spatial_metrics:
    - HOTA
    - DetA
    - AssA
  temporal_metrics:
    - "R1@0.3"
    - "R1@0.5"
    - "R1@0.7"
    - "R5@0.3"
    - "R5@0.5"
    - "R5@0.7"
    - "R10@0.3"
    - "R10@0.5"
    - "R10@0.7"
    - mAP
    - mIoU
